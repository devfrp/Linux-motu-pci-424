name: Deploy site to GitHub Pages

# Publishes docs/ by pushing it to a `gh-pages` branch. GitHub auto-serves a
# public repo's `gh-pages` branch as Pages, so this needs no Settings toggle and
# no Pages-admin token — only permission to push a branch (contents: write).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish docs/ to the gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          site="$(mktemp -d)"
          cp -r docs/. "$site/"
          touch "$site/.nojekyll"          # serve files as-is, no Jekyll
          cd "$site"
          git init -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} from docs/"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
